name: CI

on:
  push:
    branches:
      - main
      - chore/**
      - feat/**
      - fix/**
      - refactor/**
      - docs/**
      - test/**
      - perf/**
      - ci/**
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: build-and-test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm test
